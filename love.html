<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>I Love You ❤️</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Fredoka', sans-serif;
    }

    body{
      overflow-x:hidden;
        overflow-y:auto;
      background:#ffd6ea;
    }

    /* BACKGROUND */

    .container{
      width:100%;
      min-height:100vh;
      position:relative;
      overflow:hidden;

      background:
      linear-gradient(rgba(255,182,193,0.25),
      rgba(255,182,193,0.25)),
      url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1600&auto=format&fit=crop')
      center/cover no-repeat;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(35,0,35,0.65);
      backdrop-filter:blur(3px);
    }

    /* HEARTS */

    .hearts span{
      position:absolute;
      font-size:25px;
      animation:float 8s linear infinite;
      opacity:0.8;
    }

    @keyframes float{

      from{
        transform:translateY(100vh);
        opacity:0;
      }

      to{
        transform:translateY(-10vh);
        opacity:1;
      }

    }

    /* CONTENT */

    .content{
      position:relative;
      z-index:10;
      width:100%;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      padding:20px;
      color:white;
    }

    /* CAT */

    .cat{
      font-size:90px;
      margin-bottom:15px;
      animation:bounce 2s infinite;
      filter:drop-shadow(0 0 15px rgba(255,255,255,0.5));
    }

    @keyframes bounce{

      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-12px);
      }

    }

    /* TITLE */

    .title{
      font-size:80px;
      margin-bottom:15px;
      text-shadow:
      0 0 20px rgba(255,255,255,0.5);

      animation:fadeIn 1.5s ease;
    }

    .subtitle{
      font-size:22px;
      color:#ffe6f2;
      margin-bottom:45px;
      opacity:0.95;
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* BUTTONS */

    .buttons{
      position:relative;
      width:100%;
      max-width:600px;
      height:200px;
    }

    button{
      border:none;
      padding:18px 38px;
      border-radius:50px;
      font-size:20px;
      cursor:pointer;
      transition:0.25s;
      position:absolute;
      color:white;
      font-weight:600;
    }

    /* YES */

    .yes-btn{
      background:linear-gradient(45deg,#ff69b4,#ff9ed1);
      box-shadow:
      0 0 20px rgba(255,105,180,0.5);

      left:50%;
      transform:translateX(-50%);
      top:30px;
    }

    .yes-btn:hover{
      transform:translateX(-50%) scale(1.08);
    }

    /* NO */

    .no-btn{
      background:linear-gradient(45deg,#999,#bbb);
      top:120px;
      left:50%;
      transform:translateX(-50%);
    }

    /* MESSAGE */

    .message{
      margin-top:30px;
      font-size:18px;
      color:#ffd6ea;
      min-height:30px;
    }

    /* GLOW */

    .glow{
      animation:glow 1.5s infinite alternate;
    }

    @keyframes glow{

      from{
        box-shadow:
        0 0 10px rgba(255,105,180,0.4);
      }

      to{
        box-shadow:
        0 0 30px rgba(255,105,180,0.9);
      }

    }

    /* RESPONSIVE */

    @media(max-width:768px){

      .title{
        font-size:50px;
      }

      .subtitle{
        font-size:18px;
      }

      button{
        font-size:16px;
        padding:15px 28px;
      }

      .cat{
        font-size:70px;
      }

    }

  </style>
</head>

<body>

  <!-- MUSIC -->
  <audio autoplay loop>
    <source src="music/love.mp3" type="audio/mp3">
  </audio>

  <div class="container">

    <div class="overlay"></div>

    <!-- HEARTS -->
    <div class="hearts" id="hearts"></div>

    <!-- CONTENT -->
    <div class="content">

      <div class="cat">🐱💖</div>

      <h1 class="title">
        I Love You ❤️
      </h1>

      <p class="subtitle">
        Youu love me too?? ❤️
      </p>

      <!-- BUTTONS -->
      <div class="buttons">

        <!-- YES -->
        <button
          class="yes-btn glow"
          onclick="acceptLove()"
        >
          I Love You Too 💖
        </button>

        <!-- NO -->
        <button
          class="no-btn"
          id="noBtn"
          onclick="moveButton()"
        >
          No, I Don't 😭
        </button>

      </div>

      <!-- MESSAGE -->
      <div class="message" id="message"></div>

    </div>

  </div>

  <script>

    // HEART PARTICLES

    const hearts = document.getElementById("hearts");

    const emojis = ["💖","✨","🎀","💕","🐱"];

    for(let i=0; i<50; i++){

      const span = document.createElement("span");

      span.innerHTML =
      emojis[Math.floor(Math.random()*emojis.length)];

      span.style.left =
      Math.random()*100 + "vw";

      span.style.animationDuration =
      (Math.random()*5 + 5) + "s";

      span.style.fontSize =
      (Math.random()*25 + 15) + "px";

      hearts.appendChild(span);

    }

    // NO BUTTON TROLL

    let clickCount = 0;

    const noBtn =
    document.getElementById("noBtn");

    const message =
    document.getElementById("message");

    function moveButton(){

      clickCount++;

      // RANDOM POSITION

      const x =
      Math.random() * 70;

      const y =
      Math.random() * 120;

      noBtn.style.left = x + "%";
      noBtn.style.top = y + "px";

      // CHANGE TEXT

      if(clickCount == 1){

        noBtn.innerHTML =
        "Are You Sure? 🥺";

        message.innerHTML =
        "please don't break my heart 😭";

      }

      else if(clickCount == 2){

        noBtn.innerHTML =
        "Think Again 💔";

        message.innerHTML =
        "the cat will be sad 🐱";

      }

      else if(clickCount == 3){

        noBtn.innerHTML =
        "Last Chance 😭";

        message.innerHTML =
        "matcha won't taste sweet anymore 🍵";

      }

      else if(clickCount >= 4){

        noBtn.innerHTML =
        "I Love You Too 💖";

        noBtn.style.background =
        "linear-gradient(45deg,#ff69b4,#ff9ed1)";

        noBtn.classList.add("glow");

        message.innerHTML =
        "good choice 😌💖";

        noBtn.setAttribute(
          "onclick",
          "acceptLove()"
        );

      }

    }

    // ACCEPT LOVE

    function acceptLove(){

      // EFFECT

      document.body.style.transition =
      "1s";

      document.body.style.background =
      "#ff69b4";

      // CONFETTI

      for(let i=0; i<120; i++){

        const confetti =
        document.createElement("div");

        confetti.style.position =
        "absolute";

        confetti.style.width = "10px";
        confetti.style.height = "10px";

        confetti.style.left =
        Math.random()*100 + "vw";

        confetti.style.top = "-10px";

        confetti.style.background =
        `hsl(${Math.random()*360},100%,70%)`;

        confetti.style.animation =
        `fall ${Math.random()*3+2}s linear`;

        document.body.appendChild(confetti);

      }

      // STYLE

      const style =
      document.createElement("style");

      style.innerHTML = `
        @keyframes fall{
          to{
            transform:
            translateY(110vh)
            rotate(720deg);
          }
        }
      `;

      document.head.appendChild(style);

      // REDIRECT

      setTimeout(()=>{

        document.body.style.opacity = "0";

        setTimeout(()=>{

          window.location.href =
          "party.html";

        },1000);

      },3500);

    }

  </script>

</body>
</html>
