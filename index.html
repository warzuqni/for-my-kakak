<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Surprise 🎀</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Fredoka', sans-serif;
    }

    body{
      overflow-x:hidden;
        overflow-y:auto;
      background:#ffedf5;
    }

    /* BACKGROUND */
    .container{
      width:100%;
      min-height:100vh;
      position:relative;
      overflow:hidden;
      background:
      linear-gradient(rgba(255,192,203,0.2), rgba(255,192,203,0.2)),
      url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1600&auto=format&fit=crop')
      center/cover no-repeat;
    }

    /* DARK OVERLAY */
    .overlay{
      position:absolute;
      inset:0;
      background:rgba(25,0,30,0.55);
      backdrop-filter:blur(2px);
    }

    /* STARS */
    .stars{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    .star{
      position:absolute;
      width:3px;
      height:3px;
      background:white;
      border-radius:50%;
      animation:blink 2s infinite;
    }

    @keyframes blink{
      0%,100%{
        opacity:0.2;
      }
      50%{
        opacity:1;
      }
    }

    /* MAIN CONTENT */
    .content{
      position:relative;
      z-index:10;
      width:100%;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      color:white;
      padding:20px;
    }

    /* CAT */
    .cat{
      width:220px;
      animation:float 3s ease-in-out infinite;
      margin-bottom:20px;
      filter:drop-shadow(0 0 20px rgba(255,255,255,0.3));
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-12px);
      }
    }

    /* LOADING TEXT */
    .loading{
      font-size:18px;
      color:#ffd8ea;
      margin-bottom:15px;
      min-height:30px;
      letter-spacing:1px;
    }

    /* MAIN TITLE */
    .title{
      font-size:55px;
      max-width:900px;
      line-height:1.2;
      margin-bottom:20px;
      text-shadow:0 0 15px rgba(255,255,255,0.5);
      animation:fadeIn 2s ease;
    }

    .title span{
      color:#ff9ed1;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* SUBTITLE */
    .subtitle{
      font-size:20px;
      color:#ffeef7;
      margin-bottom:35px;
      opacity:0.9;
    }

    /* BUTTON */
    .btn{
      padding:18px 45px;
      border:none;
      border-radius:50px;
      background:linear-gradient(45deg,#ff66b3,#ff9ed1);
      color:white;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:
      0 0 15px rgba(255,105,180,0.5),
      0 0 35px rgba(255,105,180,0.4);
      animation:glow 2s infinite alternate;
    }

    .btn:hover{
      transform:scale(1.08);
    }

    @keyframes glow{
      from{
        box-shadow:
        0 0 10px rgba(255,105,180,0.4),
        0 0 20px rgba(255,105,180,0.3);
      }

      to{
        box-shadow:
        0 0 25px rgba(255,105,180,0.9),
        0 0 45px rgba(255,105,180,0.8);
      }
    }

    /* MUSIC INFO */
    .music{
      position:absolute;
      bottom:25px;
      left:50%;
      transform:translateX(-50%);
      color:#ffe4f2;
      font-size:14px;
      opacity:0.85;
    }

    /* HEARTS */
    .heart{
      position:absolute;
      color:pink;
      animation:fall linear infinite;
      opacity:0.7;
    }

    @keyframes fall{
      from{
        transform:translateY(-10vh);
      }

      to{
        transform:translateY(110vh);
      }
    }

    /* RESPONSIVE */
    @media(max-width:768px){

      .title{
        font-size:35px;
      }

      .subtitle{
        font-size:16px;
      }

      .cat{
        width:170px;
      }

      .btn{
        font-size:16px;
        padding:15px 35px;
      }

    }

  </style>
</head>

<body>

  <!-- MUSIC -->
  <audio autoplay loop>
    <source src="music/happybirthday.mp3" type="audio/mp3">
  </audio>

  <div class="container">

    <div class="overlay"></div>

    <!-- STARS -->
    <div class="stars" id="stars"></div>

    <!-- FALLING HEART -->
    <div id="hearts"></div>

    <!-- MAIN CONTENT -->
    <div class="content">

      <!-- CAT -->
      <img
        class="cat"
        src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
        alt="cat"
      >

      <!-- LOADING -->
      <div class="loading" id="loadingText">
        Initializing Birthday Surprise...
      </div>

      <!-- TITLE -->
      <h1 class="title">
        Today, the strongest <span>support player</span> was born 🎀
      </h1>

      <!-- SUBTITLE -->
      <p class="subtitle">
        Nurse • Pro Player • Cat Lover • Matcha Lover
      </p>

      <!-- BUTTON -->
      <button class="btn" onclick="openSurprise()">
        OPEN YOUR SURPRISE 💖
      </button>

    </div>

    <!-- MUSIC TEXT -->
    <div class="music">
      🎵 Happy Birthday Lofi Playing...
    </div>

  </div>

  <script>

    // LOADING TEXT ANIMATION
    const loadingText = document.getElementById("loadingText");

    const texts = [
      "Initializing Birthday Surprise...",
      "Loading Happiness...",
      "Preparing Matcha...",
      "Summoning Cute Cats...",
      "Connecting Heart...",
      "Success ❤️"
    ];

    let index = 0;

    setInterval(() => {
      index = (index + 1) % texts.length;
      loadingText.innerText = texts[index];
    }, 2000);

    // STARS
    const starsContainer = document.getElementById("stars");

    for(let i=0; i<120; i++){

      const star = document.createElement("div");

      star.classList.add("star");

      star.style.left = Math.random() * 100 + "%";
      star.style.top = Math.random() * 100 + "%";

      star.style.animationDuration =
      Math.random() * 3 + 1 + "s";

      starsContainer.appendChild(star);

    }

    // HEARTS
    const heartsContainer = document.getElementById("hearts");

    function createHeart(){

      const heart = document.createElement("div");

      heart.classList.add("heart");

      heart.innerHTML = "💖";

      heart.style.left = Math.random() * 100 + "vw";

      heart.style.fontSize =
      Math.random() * 20 + 10 + "px";

      heart.style.animationDuration =
      Math.random() * 5 + 5 + "s";

      heartsContainer.appendChild(heart);

      setTimeout(()=>{
        heart.remove();
      },10000);

    }

    setInterval(createHeart, 500);

    // BUTTON
    function openSurprise(){

      document.body.style.transition = "1s";
      document.body.style.opacity = "0";

      setTimeout(()=>{

        // pindah halaman berikutnya
        window.location.href = "profile.html";

      },1000);

    }

  </script>

</body>
</html>
